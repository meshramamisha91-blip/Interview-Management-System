<!DOCTYPE html>
<html>
<head>
<title>Job Management</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="dashboard">

<div class="sidebar">
<h2>⚡ AI Panel</h2>

<ul>
<li onclick="location.href='admin-dashboard.html'">Dashboard</li>
<li onclick="location.href='admin-applications.html'">Applications</li>
<li class="active">Jobs</li>
<li onclick="logout()">Logout</li>
</ul>

</div>


<div class="main-content">

<h1>💼 Job Management</h1>

<div class="job-form">

<input type="text" id="jobTitle" placeholder="Job Title">

<input type="text" id="jobSkills" placeholder="Required Skills">

<textarea id="jobDescription" placeholder="Job Description"></textarea>

<button onclick="createJob()">Create Job</button>

<input type="date" id="jobOpenDate">

<input type="date" id="jobCloseDate">

</div>


<h2>Available Jobs</h2>

<table class="app-table">

<thead>
<tr>
<th>Job ID</th>
<th>Title</th>
<th>Skills</th>
<th>Description</th>
<th>Open Date</th>
<th>Close Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="jobTable"></tbody>

</table>

</div>

</div>

<script src="admin.js"></script>

</body>
</html>
