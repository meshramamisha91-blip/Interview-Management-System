<!DOCTYPE html>
<html>
<head>
  <title>Applications</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="dashboard">

  <div class="sidebar">
    <h2>⚡ AI Panel</h2>
    <ul>
      <li onclick="location.href='admin-dashboard.html'">Dashboard</li>
      <li class="active">Applications</li>
      <li onclick="logout()">Logout</li>
    </ul>
  </div>

  <div class="main-content">

    <h1>📄 Candidate Applications</h1>

    <!-- ⭐ FILTER BAR -->
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search by Name...">

      <select id="statusFilter">
        <option value="All">All Status</option>
        <option value="Applied">Applied</option>
        <option value="Shortlisted">Shortlisted</option>
        <option value="Rejected">Rejected</option>
        <option value="Interview">Interview</option>
      </select>
    </div>

    <!-- ⭐ APPLICATION TABLE -->
    <table class="app-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Score</th>
          <th>Match %</th>
          <th>Status</th>
          <th>Resume</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="candidateTable"></tbody>
    </table>

  </div>

</div>

<!-- ⭐ INTERVIEW MODAL -->
<div id="interviewModal" class="modal">

<div class="modal-glass">

<h2><span class="icon">📅</span> Schedule Interview</h2>

<div class="modal-form">

<div class="input-group">
<label>Interview Date</label>
<input type="date" id="interviewDate">
</div>

<div class="input-group">
<label>Interview Time</label>
<input type="time" id="interviewTime">
</div>

<div class="input-group">
<label>Meeting Link</label>
<input type="text" id="meetingLink" placeholder="Paste Google Meet / Zoom Link">
</div>

</div>

<div class="modal-buttons">

<button class="save-btn" onclick="saveInterview()">💾 Save</button>

<button class="cancel-btn" onclick="closeModal()">✖ Cancel</button>

</div>

</div>

</div>

</div>
<script src="admin.js"></script>
<!-- Resume Preview Modal -->

<div id="resumeModal" class="modal">

<div class="modal-content">

<button onclick="closeResume()" style="
position:absolute;
top:10px;
right:15px;
background:red;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
">
✖
</button>

<h3>Resume Preview</h3>
<div style="margin-bottom:10px">
<button id="downloadResume" style="
background:#38bdf8;
border:none;
padding:8px 14px;
border-radius:6px;
color:white;
cursor:pointer;
">
⬇ Download Resume
</button>
</div>

<iframe id="resumeFrame"
style="width:100%;height:90%;border:none"></iframe>

</div>

</div>

</div>
</body>

</div>
</html>
